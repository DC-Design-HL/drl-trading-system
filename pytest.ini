[pytest]
# Pytest configuration for DRL Trading System

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -p no:warnings

# Coverage options (when using --cov)
# Run with: pytest --cov=src --cov-report=html --cov-report=term

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, dependencies)
    slow: Slow tests (skip in quick runs)
    requires_model: Tests that require trained models
    requires_api: Tests that require API keys/network

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeouts (if using pytest-timeout)
# timeout = 300

# Parallel execution (if using pytest-xdist)
# addopts = -n auto
